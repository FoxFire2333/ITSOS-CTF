<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Login | SecureVault</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Accesso</h2>
        <p>Accedi con:<br><strong>guest / guest123</strong></p>
        <p id="error-msg" style="color: var(--danger); display: none;">Credenziali errate.</p>

        <div>
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="button" class="btn" onclick="effettuaLogin()">Login</button>
        </div>
        <br>
        <a href="index.html" style="color: var(--primary); text-decoration: none;">&larr; Torna alla Home</a>
    </div>

    <script>
        function effettuaLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'guest' && pass === 'guest123') {
                // Creiamo il JSON e lo convertiamo in Base64
                const data = JSON.stringify({ role: "user" });
                const token = btoa(data);

                // Salviamo nel Local Storage
                localStorage.setItem('auth_token', token);

                // Andiamo alla dashboard
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
    </script>
</body>

</html>
